services:
  database:
    image: postgres:16-alpine

    environment:
      POSTGRES_DB: swarmlab
      POSTGRES_USER: swarmuser
      POSTGRES_PASSWORD: swarm_password

    volumes:
      - database_data:/var/lib/postgresql/data

    networks:
      - swarm_overlay

    deploy:
      replicas: 1

      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  backend:
    image: swarmlab-backend:1.0

    environment:
      PORT: 3000
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: swarmlab
      DB_USER: swarmuser
      DB_PASSWORD: swarm_password

    networks:
      - swarm_overlay

    deploy:
      mode: replicated
      replicas: 3

      restart_policy:
        condition: any
        delay: 5s

      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  frontend:
    image: swarmlab-frontend:1.0

    ports:
      - "8080:80"

    networks:
      - swarm_overlay

    deploy:
      replicas: 1

      restart_policy:
        condition: any
        delay: 5s

      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

networks:
  swarm_overlay:
    driver: overlay
    attachable: true

volumes:
  database_data: